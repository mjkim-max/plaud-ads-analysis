name: collect-ads-data

on:
  schedule:
    - cron: "0 21 * * *"   # 매일 06:00 KST (UTC 21:00)
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  meta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r collectors/requirements.txt

      - name: Collect Meta creative-daily → Sheets
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          PLAUD_SHEET_ID: ${{ secrets.PLAUD_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python -m collectors.meta_creative_daily
