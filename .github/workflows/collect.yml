name: collect-ads-data

on:
  schedule:
    - cron: "0 21 * * *"   # 매일 06:00 KST (UTC 21:00)
  workflow_dispatch:        # 수동 실행 버튼 (백필용 날짜 입력)
    inputs:
      since:
        description: "시작일 YYYY-MM-DD (비우면 최근 30일)"
        required: false
        default: ""
      until:
        description: "종료일 YYYY-MM-DD (비우면 오늘)"
        required: false
        default: ""

jobs:
  meta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r collectors/requirements.txt

      - name: Collect Meta creative-daily → Sheets
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          PLAUD_SHEET_ID: ${{ secrets.PLAUD_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          META_SINCE: ${{ inputs.since }}
          META_UNTIL: ${{ inputs.until }}
        run: python -m collectors.meta_creative_daily

      - name: Collect Meta placement snapshot → Sheets
        continue-on-error: true   # 지면 수집 실패해도 나머지 파이프라인 유지
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          PLAUD_SHEET_ID: ${{ secrets.PLAUD_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python -m collectors.meta_placement

      - name: Collect Meta gender×age snapshot → Sheets
        continue-on-error: true
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          PLAUD_SHEET_ID: ${{ secrets.PLAUD_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python -m collectors.meta_gender

      - name: Collect Meta placement YEAR aggregate → Sheets
        continue-on-error: true
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          PLAUD_SHEET_ID: ${{ secrets.PLAUD_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python -m collectors.meta_placement_year

      - name: Collect Google campaign-daily → Sheets
        continue-on-error: true   # 구글 미설정이어도 메타 수집은 성공 처리
        env:
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
          GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
          PLAUD_SHEET_ID: ${{ secrets.PLAUD_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          META_SINCE: ${{ inputs.since }}
          META_UNTIL: ${{ inputs.until }}
        run: python -m collectors.google_campaign_daily
